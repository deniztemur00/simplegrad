name: Build wheels and publish

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest # Linux x86_64 (manylinux)
          - ubuntu-24.04-arm # Linux aarch64 (manylinux)
          - windows-latest # Windows x86_64
          - macos-latest # macOS arm64 + cross-compiled x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        run: pipx run cibuildwheel~=3.1 --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: Check that the sdist installs from source
        run: python -m pip install dist/*.tar.gz && python -c "from simplegrad import Node; n = Node(1.0); print(n.data())"

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/simplegrad
    permissions:
      id-token: write # required for PyPI trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
